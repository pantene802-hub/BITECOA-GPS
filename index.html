<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BITECOA GPS</title>
<body>
  <div class="card">
    <h1>🌍 BITECOA GPS</h1>
    <p class="subtitle">IoT Blockchain GPS Tracking</p>
    <hr>
    <p><b>Status :</b> <span id="status">🔴 Belum Aktif</span></p>
    <p><b>Latitude :</b></p>
    <h2 id="lat">-</h2>
    <p><b>Longitude :</b></p>
    <h2 id="lng">-</h2>
    <p><b>Akurasi :</b></p>
    <h2 id="acc">-</h2>
    <p><b>Update :</b></p>
    <h2 id="time">-</h2>
    <div id="map">
      🗺️ Peta akan ditampilkan di sini
    </div>
    <button id="btnMulai" onclick="mulaiGPS()">
      ▶ Mulai Tracking
    </button>
    <button id="btnStop" onclick="stopGPS()" disabled>
      ■ Berhenti
    </button>
  </div>
</body>
</html>
